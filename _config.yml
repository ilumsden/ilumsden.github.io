  desc: Hello, my name is Ian, and I am a senior and soon-to-be PhD student at the University of Tennessee, Knoxville. I am majoring in Computer Science, but I started out as a Computer Engineering major with a minor in Materials Science and Engineering. Although my major and minor have changed, I am still extremely interested in almost every science and engineering field, and my work outside the classroom reflects this interest. From the summer after my freshman year until the end of 2018, I worked as an intern with the Neutron Data Analysis Group at Oak Ridge National Lab (ORNL) writing software to help physicists analyze data collected at ORNL and simulate neutron scattering experiments. Additionally, during my time at ORNL, I developed a tool to help scientists and engineers at ORNL's Manufacturing Demonstration Facility 3D print parts for instruments at ORNL neutron research facilities. Since May 2019, I have been working in the field of High Performance Computing, which I entend to concentrate in during my PhD studies. In this field, I have been doing work related to both software performance research and molecular dynamics simulations. Outside of the classroom and research, I am a leading software member of UT's IEEE Robotics team. As part of this team, I help plan, build, and code autonomous robots for us to compete at the hardware competition at the annual IEEE SoutheastCon conference. I also work closely with the board of UT's IEEE Student Branch to help plan and host various events, although I am not a member of the board. As previously mentioned, after earning my degree, I will enter the PhD program at UT in Computer Science with a concentration in High Performance Computing. During and after my graduate studies, I hope to continue to develop interdisciplanary, impactful software through my research.
  
#I'm a Senior at the University of Tennessee, Knoxville, majoring in Computer Science. I'm a huge fan of all aspects of software development, but I'm especially interested in machine learning/AI, high-performance computing,  and data-driven software development. I'm also interested in autonomous robotics, and I am a member of UTK's IEEE Robotics Team.  # Describe yourself.

